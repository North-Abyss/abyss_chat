<!DOCTYPE html>
<html>

<head>

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description"
    content="Abyss Chat is a secure, decentralized, peer-to-peer messaging and video calling application. Connect privately without intermediaries.">
  <meta name="keywords"
    content="Abyss Chat, P2P, peer-to-peer, secure messaging, encrypted chat, video call, decentralized communication, WebRTC">

  <meta property="og:type" content="website">

  <meta property="og:description"
    content="Secure, decentralized, peer-to-peer messaging and video calling application. Connect privately without intermediaries.">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:title" content="Abyss Chat - Decentralized P2P Messaging">

    content="Secure, decentralized, peer-to-peer messaging and video calling application. Connect privately without intermediaries.">
  <meta property="twitter:image" content="https://north-abyss.github.io/abyss_chat/assets/assets/Screenshot-02.png">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Abyss Chat">

  <link rel="icon" type="image/png" href="favicon.png" />

  <title>Abyss Chat | Decentralized P2P Messaging</title>
